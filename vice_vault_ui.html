
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body, .vv-root {
    font-family: 'Lora', Georgia, serif;
    background: transparent;
  }

  .vv-root {
    max-width: 680px;
    margin: 0 auto;
    padding: 2rem 1.5rem 3rem;
  }

  /* Header */
  .vv-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }

  .vv-title-block {}
  .vv-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--color-text-tertiary);
    margin-bottom: 6px;
  }
  .vv-title {
    font-size: 28px;
    font-weight: 500;
    color: var(--color-text-primary);
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .vv-subtitle {
    font-style: italic;
    font-size: 14px;
    color: var(--color-text-secondary);
    margin-top: 4px;
  }

  /* Lock status badge */
  .vv-lock-badge {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .vv-lock-icon {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1.5px solid;
    transition: all 0.5s ease;
  }
  .vv-lock-icon.locked {
    background: #FEF3E2;
    border-color: #D97706;
  }
  .vv-lock-icon.unlocked {
    background: #EAF3DE;
    border-color: #3B6D11;
  }
  .vv-lock-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: color 0.5s ease;
  }
  .vv-lock-label.locked { color: #D97706; }
  .vv-lock-label.unlocked { color: #3B6D11; }

  /* Progress bar */
  .vv-progress-wrap {
    margin-bottom: 2rem;
  }
  .vv-progress-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .vv-progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--color-text-tertiary);
  }
  .vv-progress-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--color-text-secondary);
  }
  .vv-progress-track {
    height: 3px;
    background: var(--color-border-tertiary);
    border-radius: 2px;
    overflow: hidden;
  }
  .vv-progress-fill {
    height: 100%;
    background: #3B6D11;
    border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Task list */
  .vv-tasks {
    list-style: none;
    margin-bottom: 1.5rem;
  }

  .vv-task {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    cursor: pointer;
    transition: opacity 0.3s ease;
    position: relative;
  }
  .vv-task:first-child {
    border-top: 0.5px solid var(--color-border-tertiary);
  }
  .vv-task:hover { opacity: 0.75; }

  .vv-checkbox {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--color-border-secondary);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
    background: transparent;
  }
  .vv-checkbox.done {
    background: #3B6D11;
    border-color: #3B6D11;
  }
  .vv-checkmark {
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .vv-checkbox.done .vv-checkmark { opacity: 1; }

  .vv-task-text {
    flex: 1;
    font-size: 15px;
    color: var(--color-text-primary);
    line-height: 1.4;
    transition: all 0.3s ease;
  }
  .vv-task-text.done {
    color: var(--color-text-tertiary);
    text-decoration: line-through;
    text-decoration-color: var(--color-border-secondary);
  }

  .vv-task-id {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--color-text-tertiary);
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  .vv-task-delete {
    opacity: 0;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--color-text-tertiary);
    padding: 2px 6px;
    font-size: 14px;
    border-radius: 4px;
    transition: opacity 0.2s ease, color 0.2s ease;
    flex-shrink: 0;
  }
  .vv-task:hover .vv-task-delete { opacity: 1; }
  .vv-task-delete:hover { color: #A32D2D; }

  /* Empty state */
  .vv-empty {
    text-align: center;
    padding: 2.5rem 1rem;
    border-top: 0.5px solid var(--color-border-tertiary);
    border-bottom: 0.5px solid var(--color-border-tertiary);
    margin-bottom: 1.5rem;
  }
  .vv-empty-icon {
    margin-bottom: 10px;
    opacity: 0.35;
  }
  .vv-empty-text {
    font-style: italic;
    font-size: 14px;
    color: var(--color-text-tertiary);
  }

  /* Unlock banner */
  .vv-unlock-banner {
    display: none;
    background: #EAF3DE;
    border: 1px solid #639922;
    border-radius: var(--border-radius-md);
    padding: 12px 16px;
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .vv-unlock-banner.visible { display: block; }
  .vv-unlock-text {
    font-size: 13px;
    color: #27500A;
    font-style: italic;
  }
  .vv-unlock-text strong { font-weight: 500; font-style: normal; }

  /* Input row */
  .vv-add-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }
  .vv-input {
    flex: 1;
    font-family: 'Lora', Georgia, serif;
    font-size: 14px;
    padding: 10px 14px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    outline: none;
    transition: border-color 0.2s;
  }
  .vv-input:focus {
    border-color: var(--color-border-primary);
  }
  .vv-input::placeholder {
    font-style: italic;
    color: var(--color-text-tertiary);
  }
  .vv-add-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 10px 18px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    white-space: nowrap;
  }
  .vv-add-btn:hover {
    background: var(--color-background-secondary);
    border-color: var(--color-border-primary);
  }
  .vv-add-btn:active { transform: scale(0.98); }

  /* Footer */
  .vv-footer {
    margin-top: 2.5rem;
    padding-top: 1.5rem;
    border-top: 0.5px solid var(--color-border-tertiary);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .vv-version {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--color-text-tertiary);
  }
  .vv-clear-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    background: none;
    border: none;
    color: var(--color-text-tertiary);
    cursor: pointer;
    padding: 4px 0;
    transition: color 0.2s;
  }
  .vv-clear-btn:hover { color: #A32D2D; }

  /* Task entry animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .vv-task.new { animation: slideIn 0.3s ease forwards; }
</style>

<div class="vv-root">

  <div class="vv-header">
    <div class="vv-title-block">
      <div class="vv-eyebrow">Vice Vault — v0.2.0</div>
      <div class="vv-title">Task Lock</div>
      <div class="vv-subtitle">The box opens when the list is clear.</div>
    </div>
    <div class="vv-lock-badge">
      <div class="vv-lock-icon locked" id="lockIcon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" id="lockSvg" style="color:#D97706; transition:color 0.5s;">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <div class="vv-lock-label locked" id="lockLabel">Locked</div>
    </div>
  </div>

  <div class="vv-progress-wrap" id="progressWrap" style="display:none;">
    <div class="vv-progress-header">
      <span class="vv-progress-label">Progress</span>
      <span class="vv-progress-count" id="progressCount">0 / 0</span>
    </div>
    <div class="vv-progress-track">
      <div class="vv-progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="vv-unlock-banner" id="unlockBanner">
    <div class="vv-unlock-text"><strong>All tasks complete.</strong> The vault is unlocked.</div>
  </div>

  <ul class="vv-tasks" id="taskList"></ul>

  <div class="vv-empty" id="emptyState">
    <div class="vv-empty-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" style="color:var(--color-text-tertiary);">
        <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
      </svg>
    </div>
    <div class="vv-empty-text">Add your first task to lock the vault.</div>
  </div>

  <div class="vv-add-row">
    <input type="text" class="vv-input" id="taskInput" placeholder="What needs to be done?" maxlength="120" />
    <button class="vv-add-btn" id="addBtn">+ Add</button>
  </div>

  <div class="vv-footer">
    <span class="vv-version">C++ console → hardware bridge</span>
    <button class="vv-clear-btn" id="clearBtn">Clear all</button>
  </div>

</div>

<script>
  const taskList = document.getElementById('taskList');
  const taskInput = document.getElementById('taskInput');
  const addBtn = document.getElementById('addBtn');
  const emptyState = document.getElementById('emptyState');
  const lockIcon = document.getElementById('lockIcon');
  const lockLabel = document.getElementById('lockLabel');
  const lockSvg = document.getElementById('lockSvg');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressCount = document.getElementById('progressCount');
  const unlockBanner = document.getElementById('unlockBanner');
  const clearBtn = document.getElementById('clearBtn');

  let tasks = [];
  let idCounter = 1;

  function genId() {
    return idCounter++;
  }

  function updateUI() {
    const total = tasks.length;
    const done = tasks.filter(t => t.completed).length;
    const allDone = total > 0 && done === total;

    emptyState.style.display = total === 0 ? 'block' : 'none';
    progressWrap.style.display = total > 0 ? 'block' : 'none';

    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    progressFill.style.width = pct + '%';
    progressCount.textContent = done + ' / ' + total;

    if (allDone) {
      lockIcon.className = 'vv-lock-icon unlocked';
      lockLabel.className = 'vv-lock-label unlocked';
      lockLabel.textContent = 'Unlocked';
      lockSvg.style.color = '#3B6D11';
      lockSvg.innerHTML = '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>';
      unlockBanner.classList.add('visible');
    } else {
      lockIcon.className = 'vv-lock-icon locked';
      lockLabel.className = 'vv-lock-label locked';
      lockLabel.textContent = 'Locked';
      lockSvg.style.color = '#D97706';
      lockSvg.innerHTML = '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>';
      unlockBanner.classList.remove('visible');
    }
  }

  function renderTasks() {
    taskList.innerHTML = '';
    tasks.forEach((task, idx) => {
      const li = document.createElement('li');
      li.className = 'vv-task' + (task.isNew ? ' new' : '');
      task.isNew = false;

      const cb = document.createElement('div');
      cb.className = 'vv-checkbox' + (task.completed ? ' done' : '');
      cb.innerHTML = '<svg class="vv-checkmark" width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"/></svg>';

      const text = document.createElement('span');
      text.className = 'vv-task-text' + (task.completed ? ' done' : '');
      text.textContent = task.description;

      const idSpan = document.createElement('span');
      idSpan.className = 'vv-task-id';
      idSpan.textContent = '#' + String(task.id).padStart(2, '0');

      const del = document.createElement('button');
      del.className = 'vv-task-delete';
      del.textContent = '×';
      del.title = 'Remove task';
      del.onclick = (e) => {
        e.stopPropagation();
        tasks.splice(idx, 1);
        renderTasks();
        updateUI();
      };

      li.onclick = () => {
        task.completed = !task.completed;
        renderTasks();
        updateUI();
      };

      li.appendChild(cb);
      li.appendChild(text);
      li.appendChild(idSpan);
      li.appendChild(del);
      taskList.appendChild(li);
    });
    updateUI();
  }

  function addTask() {
    const desc = taskInput.value.trim();
    if (!desc) return;
    tasks.push({ id: genId(), description: desc, completed: false, isNew: true });
    taskInput.value = '';
    renderTasks();
  }

  addBtn.onclick = addTask;
  taskInput.onkeydown = (e) => { if (e.key === 'Enter') addTask(); };
  clearBtn.onclick = () => {
    tasks = [];
    idCounter = 1;
    renderTasks();
  };

  const seed = [];
  tasks = seed;
  renderTasks();
</script>
